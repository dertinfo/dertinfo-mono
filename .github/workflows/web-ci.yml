name: Web CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/dert-web/**'
      - 'package.json'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'apps/dert-web/**'
      - 'package.json'
      - '.github/workflows/web-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dert-web/src/client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/dert-web/src/client/package.json

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm run test -- --watch=false --browsers=ChromeHeadless
        continue-on-error: true

      - name: Build
        run: npm run build
