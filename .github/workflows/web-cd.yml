name: Web CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/dert-web/**'
      - 'package.json'
      - '.github/workflows/web-cd.yml'
      - '.github/workflows/reusable/**'

concurrency:
  group: web-cd-test
  cancel-in-progress: true

jobs:
  docker:
    uses: ./.github/workflows/reusable/build-push-docker.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    with:
      dockerfile: apps/dert-web/Dockerfile
      context: apps/dert-web
      image_repository: dertinfo/dertinfo-web

  deploy-test:
    environment: test
    uses: ./.github/workflows/reusable/deploy-static-web-app.yml
    secrets:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TEST }}
    with:
      environment: test
      app_location: apps/dert-web/src/client
      api_location: apps/dert-web/src/functions
      output_location: dist
      build_command: npm run ado-build-ui-test
      submodules: true
