name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      dockerfile:
        required: true
        type: string
      context:
        required: true
        type: string
      image_repository:
        required: true
        type: string
      environment:
        required: true
        type: string
        description: 'test or prod — test tags use a -test suffix so they do not overwrite release tags'
    secrets:
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.image_repository }}:latest" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.image_repository }}:${{ github.run_id }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.image_repository }}:latest-test" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.image_repository }}:${{ github.run_id }}-test" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
