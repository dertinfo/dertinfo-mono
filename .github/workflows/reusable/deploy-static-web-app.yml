name: Deploy to Azure Static Web Apps

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      app_location:
        required: true
        type: string
      output_location:
        required: true
        type: string
      build_command:
        required: true
        type: string
      api_location:
        required: false
        type: string
        default: ''
      submodules:
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_STATIC_WEB_APPS_API_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}

      - name: Deploy to Azure Static Web Apps (with API)
        if: inputs.api_location != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ inputs.app_location }}
          api_location: ${{ inputs.api_location }}
          output_location: ${{ inputs.output_location }}
          app_build_command: ${{ inputs.build_command }}

      - name: Deploy to Azure Static Web Apps (app only)
        if: inputs.api_location == ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ inputs.app_location }}
          output_location: ${{ inputs.output_location }}
          app_build_command: ${{ inputs.build_command }}
