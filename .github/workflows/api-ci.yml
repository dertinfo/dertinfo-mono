name: API CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/dert-api/**'
      - 'packages/**'
      - 'dertinfo.sln'
      - 'Directory.Build.props'
      - '.github/workflows/api-ci.yml'
  pull_request:
    paths:
      - 'apps/dert-api/**'
      - 'packages/**'
      - 'dertinfo.sln'
      - 'Directory.Build.props'
      - '.github/workflows/api-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore dertinfo.sln

      - name: Build
        run: dotnet build dertinfo.sln --no-restore --configuration Release

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: api-build-output
          retention-days: 1
          path: |
            apps/dert-api/src/**/bin/
            apps/dert-api/src/**/obj/

  unit-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: api-build-output
          path: apps/dert-api/src

      - name: Run unit tests
        run: |
          dotnet test apps/dert-api/src/dertinfo-api.utests/dertinfo-api.utests.csproj --no-build --configuration Release --verbosity normal
          dotnet test apps/dert-api/src/dertinfo-services.utests/dertinfo-services.utests.csproj --no-build --configuration Release --verbosity normal
          dotnet test apps/dert-api/src/dertinfo-repository.utests/dertinfo-repository.utests.csproj --no-build --configuration Release --verbosity normal

  integration-test:
    needs: build
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: api-build-output
          path: apps/dert-api/src

      # Disabled: requires SQL Server on the runner. See docs/planned-fixes/cicd-future-phase.md.
      - name: Run integration tests
        run: dotnet test apps/dert-api/src/dertinfo-api.itests/dertinfo-api.itests.csproj --no-build --configuration Release --verbosity normal
